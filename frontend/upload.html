<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Pipeline Upload</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sidebar">
  <button class="sidebar-btn active" title="Home" onclick="window.location.href='index.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
  </button>

  <button class="sidebar-btn" title="New" onclick="window.location.href='upload.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>
</div>

  <main class="main">

    <div class="header">
      <h1>Upload File</h1>
      <p>Add a new file to the pipeline</p>
    </div>

    <div class="upload-area" id="upload-area">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p class="upload-area-text">Drag & drop a file here</p>
      <p class="upload-area-sub">or</p>
      <label class="upload-btn" for="file-input">Choose File</label>
      <input type="file" id="file-input" hidden />
    </div>

    <div class="upload-status" id="upload-status"></div>

  </main>

  <script src="upload.js"></script>

</body>
</html>
