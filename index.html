<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Pipeline</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sidebar">
  <button class="sidebar-btn active" title="Home" onclick="window.location.href='index.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
  </button>

  <button class="sidebar-btn" title="New" onclick="window.location.href='upload.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>
</div>

  <main class="main">

    <div class="header">
      <h1>Smart Pipeline</h1>
      <p>Automated file processing</p>
    </div>

    <div class="overview-label">Overview</div>

<div class="cards">
  <div class="card dark">
    <div class="card-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div class="card-number" id="total-files">0</div>
    <div class="card-label">Total Files</div>
  </div>

  <div class="card">
    <div class="card-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>'
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
    </div>
    <div class="card-number" id="image-count">0</div>
    <div class="card-label">Images</div>
  </div>

  <div class="card">
    <div class="card-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
      </svg>
    </div>
    <div class="card-number" id="document-count">0</div>
    <div class="card-label">Documents</div>
  </div>
</div>

    <div class="section-label">Processed Files</div>

<table class="file-table">
<thead>
  <tr>
    <th>Preview</th>
    <th>File</th>
    <th>Service</th>
    <th>Status</th>
    <th>Date</th>
    <th></th>
  </tr>
</thead>

  <tbody id="results-body"></tbody>
</table>

    <div class="empty-state">
      <div class="empty-icon"></div>
      <p>No files processed yet</p>
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
