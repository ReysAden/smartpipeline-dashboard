<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartPipeline</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sidebar">
    <div class="home-btn">
      <div class="house-icon">
        <div class="house-roof"></div>
        <div class="house-body">
          <div class="house-door"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <h1>SmartPipeline</h1>
      <p>Automated file processing</p>
    </div>

    <div class="overview-label">Overview</div>

    <div class="cards">
      <div class="card dark">
        <div class="card-icon">
          <div class="icon-folder">
            <div class="tab"></div>
            <div class="body"></div>
          </div>
        </div>
        <div class="card-number">0</div>
        <div class="card-label">Total Files</div>
      </div>

      <div class="card">
        <div class="card-icon">
          <div class="icon-image">
            <div class="sun"></div>
            <div class="mountain"></div>
          </div>
        </div>
        <div class="card-number">0</div>
        <div class="card-label">Images</div>
      </div>

      <div class="card">
        <div class="card-icon">
          <div class="icon-doc">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
          </div>
        </div>
        <div class="card-number">0</div>
        <div class="card-label">Documents</div>
      </div>
    </div>

    <div class="section-label">Processed Files</div>

    <table class="file-table">
      <thead>
        <tr>
          <th>File</th>
          <th>Type</th>
          <th>Size</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
    </table>

    <div class="empty-state">
      <div class="empty-icon"></div>
      <p>No files processed yet</p>
    </div>

  </div>

</body>
</html>
